# أضف داخل server { ... } للموقع (أو داخل location / إن لزم)
# يمنع 504 أثناء تسجيل الدخول الطويل أو اتصال Quotex البطيء
# مع gunicorn/uvicorn: workers=1 حتى تبقى جلسات المستخدمين في نفس الذاكرة (مهم لـ PIN)
#
# مع Cloudflare (برتقالي DNS): ولّد ملف الثقة بعناوين CF ثم ضمّنه في http { }:
#   bash deployment/generate-cloudflare-nginx-realip.sh /etc/nginx/conf.d/cloudflare-realip.conf
#   include /etc/nginx/conf.d/cloudflare-realip.conf;
proxy_connect_timeout 180s;
proxy_send_timeout 180s;
proxy_read_timeout 180s;
send_timeout 180s;
